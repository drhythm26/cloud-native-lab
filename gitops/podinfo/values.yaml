replicaCount: 1
image:
  repository: ghcr.io/stefanprodan/podinfo
  tag: 6.14.0
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 9898
livenessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
readnessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi