apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 7.8.2
      helm:
        releaseName: argo-cd
        valueFiles:
          - $values/gitops/argocd/values.yaml
    - repoURL: https://github.com/drhythm26/cloud-native-lab
      targetRevision: platform/podinfo
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true