apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/drhythm26/cloud-native-lab
    targetRevision: main
    path: gitops/apps/podinfo
    helm:
      valueFiles:
        - default-values.yaml
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: podinfo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true