apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: applications-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/drhythm26/cloud-native-lab
    targetRevision: platform/podinfo
    path: gitops/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true