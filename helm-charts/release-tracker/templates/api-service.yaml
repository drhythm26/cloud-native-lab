apiVersion: v1
kind: Service
metadata:
  name: release-tracker-api
  namespace: release-tracker
  labels:
    {{- include "release-tracker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: release-tracker-api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.api.port }}
