apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-tracker-api
  namespace: release-tracker
  labels:
    {{- include "release-tracker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: release-tracker-api
  template:
    metadata:
      labels:
        app: release-tracker-api
    spec:
      containers:
        - name: api
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: release-tracker-config
            - secretRef:
                name: release-tracker-secret
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
