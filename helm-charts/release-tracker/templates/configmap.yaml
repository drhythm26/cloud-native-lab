apiVersion: v1
kind: ConfigMap
metadata:
  name: release-tracker-config
  namespace: release-tracker
  labels:
    {{- include "release-tracker.labels" . | nindent 4 }}
data:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: {{ .Values.postgres.database }}
  DB_USER: {{ .Values.postgres.user }}
  DB_SSLMODE: disable
