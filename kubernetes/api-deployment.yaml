apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-tracker-api
  namespace: release-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: release-tracker-api
  template:
    metadata:
      labels:
        app: release-tracker-api
    spec:
      containers:
        - name: api
          image: asia-east2-docker.pkg.dev/dev-2026522/release-tracker/release-tracker-api:v0.1.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: release-tracker-config
            - secretRef:
                name: release-tracker-secret
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
